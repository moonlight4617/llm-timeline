name: LLM Timeline — 自動収集 & GitHub Pages デプロイ

on:
  schedule:
    # 毎日 JST 10:00（UTC 01:00）に実行
    - cron: '0 1 * * *'
  # 手動実行も可能
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'DRY-RUN（保存せず確認のみ）'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  collect-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: 依存パッケージのインストール
        run: |
          pip install -r requirements.txt

      - name: イベントを収集
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scripts/collect.py --dry-run
          else
            python scripts/collect.py
          fi

      - name: data.json をビルド
        run: python scripts/build.py

      - name: 新規イベントをコミット
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events/ site/data.json
          git diff --cached --quiet || git commit -m "chore: auto-collect LLM events $(date +'%Y-%m-%d')"
          git push

      - name: GitHub Pages デプロイ用にファイルをコピー
        run: |
          mkdir -p _site
          cp -r site/* _site/

      - name: GitHub Pages へデプロイ
        if: github.event.inputs.dry_run != 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          cname: ''  # カスタムドメインを使う場合はここに設定
